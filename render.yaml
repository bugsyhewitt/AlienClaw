services:
  - type: web
    name: alienclaw
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: "8080"
      - key: SETUP_PASSWORD
        sync: false
      - key: ALIENCLAW_STATE_DIR
        value: /data/.alienclaw
      - key: ALIENCLAW_WORKSPACE_DIR
        value: /data/workspace
      - key: ALIENCLAW_GATEWAY_TOKEN
        generateValue: true
    disk:
      name: alienclaw-data
      mountPath: /data
      sizeGB: 1
