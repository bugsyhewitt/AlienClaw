name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package.json'
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Cross-language genome spec compliance (TypeScript side)
        run: npx vitest run test/genome/ts-fixture-runner.test.ts
      - name: Cross-language brain registry compliance (TypeScript side)
        run: npx vitest run test/brains/ts-fixture-runner.test.ts
      - name: Governance loop tests with coverage
        run: |
          npx vitest run test/governance/ \
            --coverage --coverage.provider=v8 \
            --coverage.thresholds.lines=95 \
            --coverage.thresholds.branches=90 \
            --coverage.include="src/alienclaw/governance/*.ts"

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package.json'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npx vitest run --reporter=verbose

  python:
    name: Python lint + test + genome coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Validate fixture file
        run: |
          python3 -c "
          import json, sys
          with open('test/fixtures/genome-spec-fixtures.json') as f:
              data = json.load(f)
          assert 'cases' in data, 'fixture missing cases array'
          assert len(data['cases']) >= 50, f'fewer than 50 cases: {len(data[\"cases\"])}'
          assert data.get('\$schema_version') == '1.0', 'fixture schema version unexpected'
          print(f'Fixture OK: {len(data[\"cases\"])} cases')
          "
      - name: Validate brain registry fixture
        run: |
          python3 -c "
          import json, sys
          with open('test/fixtures/brain-registry-fixtures.json') as f:
              data = json.load(f)
          assert 'cases' in data, 'fixture missing cases array'
          assert len(data['cases']) >= 30, f'fewer than 30 cases: {len(data[\"cases\"])}'
          assert data.get('\$schema_version') == '1.0', 'fixture schema version unexpected'
          print(f'Brain fixture OK: {len(data[\"cases\"])} cases')
          "
      - name: Lint Python files
        run: ruff check src/alienclaw/genome/ test/genome/ src/alienclaw/brains/ test/brains/
      - name: Test genome module with coverage
        run: |
          PYTHONPATH=src pytest test/genome/ \
            --cov=alienclaw.genome \
            --cov-report=term-missing \
            --cov-fail-under=95 \
            -q
      - name: Test brain registry with coverage
        run: |
          PYTHONPATH=src pytest test/brains/ \
            --cov=alienclaw.brains \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -q
      - name: Lint seed/msb/ brains
        run: |
          PYTHONPATH=src python3 -c "
          from alienclaw.brains.registry import BrainRegistry
          import sys
          try:
              reg = BrainRegistry.load('seed/msb/')
              print(f'OK: {len(reg.all_brains())} brains loaded.')
              if reg.warnings:
                  for w in reg.warnings:
                      print(f'  warn: {w}')
          except Exception as e:
              print(f'FAIL: {e}')
              sys.exit(1)
          "
      - name: Lint evolution module
        run: ruff check src/alienclaw/evolution/ test/evolution/
      - name: Run evolution tests with coverage
        env:
          PYTHONPATH: src
        run: |
          rm -rf ~/.alienclaw/populations/
          pytest test/evolution/ \
            --cov=alienclaw.evolution \
            --cov-report=term-missing \
            --cov-fail-under=85 \
            -q
      - name: Verify no leak directories
        run: |
          if [ -d "$HOME/.alienclaw/populations/" ]; then
            echo "FAIL: tests left ~/.alienclaw/populations/ behind"
            ls -la "$HOME/.alienclaw/populations/"
            exit 1
          fi
          if [ -d "$HOME/.alienclaw/specialists/" ]; then
            REMAINING=$(ls "$HOME/.alienclaw/specialists/" | wc -l | tr -d ' ')
            if [ "$REMAINING" -gt 0 ]; then
              echo "FAIL: $REMAINING specialist directories left behind"
              ls "$HOME/.alienclaw/specialists/"
              exit 1
            fi
          fi
          echo "Leak check: OK — no leftover directories"
      - name: Run diagnostics tests with coverage
        env:
          PYTHONPATH: src
        run: |
          rm -rf ~/.alienclaw/diagnostics/
          pytest test/diagnostics/ \
            --cov=alienclaw.diagnostics \
            --cov-report=term-missing \
            --cov-fail-under=90 \
            -q
          if [ -d "$HOME/.alienclaw/diagnostics/" ]; then
            echo "FAIL: diagnostics tests left ~/.alienclaw/diagnostics/ behind"
            exit 1
          fi
      - name: Note — API tests moved to TypeScript
        run: |
          echo "The AlienClaw community API was ported to TypeScript in Packet 31.5."
          echo "API tests now run via vitest (TypeScript CI job). No Python API tests remain."
      - name: Web search backend test
        env:
          PYTHONPATH: src
        run: |
          pytest test/tools/test_web_search_backend.py -v
      - name: Verify site/ structural integrity
        run: |
          for F in index.html about.html api.html leaderboard.html donate.html styles.css; do
            test -f "site/$F" || { echo "MISSING: site/$F"; exit 1; }
          done
          for F in site/*.html; do
            head -1 "$F" | grep -qi '<!doctype html' \
              || { echo "FAIL: $F missing doctype"; exit 1; }
          done
          if grep -rqE 'src="https://|src="http://|href="https://[^"]+\.css|href="http://[^"]+\.css' site/; then
            echo "FAIL: external script/CSS references found in site/"
            grep -rE 'src="https://|src="http://' site/ || true
            exit 1
          fi
          echo "site/ structural check: OK"

  shell:
    name: Shell script lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          SH_FILES=$(find . -name '*.sh' -not -path './node_modules/*')
          if [ -n "$SH_FILES" ]; then
            shellcheck -S warning $SH_FILES || true
            shellcheck -S error $SH_FILES
          else
            echo "No shell scripts found, skipping"
          fi

  install-smoke:
    name: Install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install OpenClaw
        run: npm install -g openclaw
      - name: Dry-run installer
        run: bash install.sh --dry-run
      - name: Real install
        run: bash install.sh
      - name: Verify agents installed
        run: openclaw agents list | grep -E 'bossbot|advisorbot|creatorbot'
      - name: Uninstall
        run: bash install.sh --uninstall
