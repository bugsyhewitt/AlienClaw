name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typescript:
    name: TypeScript typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package.json'
      - name: Install dependencies
        run: npm install
      - name: Typecheck
        run: npx tsc --noEmit

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: 'package.json'
      - name: Install dependencies
        run: npm install
      - name: Run tests
        run: npx vitest run --reporter=verbose

  python:
    name: Python lint + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest
      - name: Lint Python files
        run: |
          PY_FILES=$(find . -name '*.py' -not -path './node_modules/*')
          if [ -n "$PY_FILES" ]; then
            ruff check $PY_FILES
          else
            echo "No Python files found, skipping lint"
          fi
      - name: Test Python files
        run: |
          PY_TESTS=$(find . -name 'test_*.py' -not -path './node_modules/*')
          if [ -n "$PY_TESTS" ]; then
            pytest -q $PY_TESTS
          else
            echo "No Python test files found, skipping"
          fi

  shell:
    name: Shell script lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update -qq && sudo apt-get install -y shellcheck
      - name: Lint shell scripts
        run: |
          SH_FILES=$(find . -name '*.sh' -not -path './node_modules/*')
          if [ -n "$SH_FILES" ]; then
            shellcheck -S warning $SH_FILES || true
            shellcheck -S error $SH_FILES
          else
            echo "No shell scripts found, skipping"
          fi

  install-smoke:
    name: Install smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install OpenClaw
        run: npm install -g openclaw
      - name: Dry-run installer
        run: bash install.sh --dry-run
      - name: Real install
        run: bash install.sh
      - name: Verify agents installed
        run: openclaw agents list | grep -E 'bossbot|advisorbot|creatorbot'
      - name: Uninstall
        run: bash install.sh --uninstall
