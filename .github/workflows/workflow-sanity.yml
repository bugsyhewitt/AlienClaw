name: Workflow Sanity

on:
  pull_request:
  push:
    branches: [main]

jobs:
  no-tabs:
    name: No tabs in workflow files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Fail on tabs in workflow files
        run: |
          python3 - <<'PY'
          import pathlib, sys
          root = pathlib.Path(".github/workflows")
          bad = [str(p) for p in sorted(root.rglob("*.yml")) if b"\t" in p.read_bytes()]
          bad += [str(p) for p in sorted(root.rglob("*.yaml")) if b"\t" in p.read_bytes()]
          if bad:
              print("Tabs found in workflow file(s):")
              for f in bad: print(f"  {f}")
              sys.exit(1)
          print(f"OK: {len(list(root.rglob('*.yml')))} workflow files checked, no tabs")
          PY

  actionlint:
    name: Workflow lint (actionlint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install actionlint
        run: |
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) latest /usr/local/bin
      - name: Lint workflows
        run: actionlint
