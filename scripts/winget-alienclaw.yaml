# YAML schema for winget (https://github.com/microsoft/winget-pkgs)
Id: AlienTool.AlienClaw
Version: "2026.3.7"
Name: AlienClaw
Description: Three-agent AI governance layer for OpenClaw — BossBot, AdvisorBot, CreatorBot
Publisher: AlienTool
Homepage: https://alienclaw.net
License: MIT
LicenseUrl: https://github.com/AlienTool/AlienClaw/blob/main/LICENSE
ShortDescription: Three wired OpenClaw agents with inter-agent routing
Installer:
  Type: msi
  DownloadUrl: https://github.com/AlienTool/AlienClaw/releases/download/v2026.3.7/AlienClaw-2026.3.7.msi
  Hash: sha256:TODO_UPDATE_AFTER_FIRST_RELEASE
  ProductCode: "{A1B2C3D4-E5F6-7890-ABCD-EF1234567890}"
  InstallLocation: "{{InstallPath}}"
  UpgradeBehavior: install
  InstallerMedia:
    VolumeLabel: "AlienClaw"
  InstallArguments: /qn
PreInstall:
  # Check for OpenClaw
  PowerShell: |
    if (!(Get-Command openclaw -ErrorAction SilentlyContinue)) {
      Write-Host "OpenClaw not found. Installing..." -ForegroundColor Yellow
      npm install -g openclaw
    }
PostInstall:
  # Run AlienClaw install.sh
  File: install.sh
  Arguments: --no-input
Uninstall:
  File: install.sh
  Arguments: --uninstall
Environment:
  OPENCLAW_HOME: "%USERPROFILE%\.openclaw"
  ALIENCLAW_HOME: "%USERPROFILE%\.alienclaw"
Notes: |
  After install, start chatting with: openclaw chat
  List agents with: openclaw agents list
  Uninstall agents with: winget uninstall AlienTool.AlienClaw